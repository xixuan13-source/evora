<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <nav>
    <a href="/">Home</a> |
    <a href="/dashboard">Dashboard</a> |
    <a href="/expenses">Expenses</a> |
    <a href="/budgets">Budgets</a> |
    <a href="/feedback">Feedback</a>
    </nav>

    <hr>

<h1>Add Expense</h1>

<form method="POST">

    <p>Expense Description</p>
    <input
    type="text"
    name="description"
    placeholder="e.g. Chicken Rice, Bubble Tea, MRT Ride"
    required>

    <p>Amount ($)</p>
    <input type="number" step="0.01" name="amount" placeholder="e.g. 5.50" required>

    <p>Category</p>

    <select name="category_id">

        {% for category in categories %}

            <option value="{{ category[0] }}">
                {{ category[1] }}
            </option>

        {% endfor %}

    </select>

    <p>Date</p>
    <input type="date" name="expense_date" required>

    <br><br>

    <button type="submit">
        Save Expense
    </button>

</form>

</body>
</html>
